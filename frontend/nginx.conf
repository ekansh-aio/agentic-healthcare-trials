server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Security headers (supplement app-level headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Proxy API requests to the backend via the ALB (HTTP).
    # This ensures API calls work regardless of whether the frontend is reached
    # via HTTP or HTTPS (e.g. CloudFront terminating TLS).
    # Host is set to the ALB's own hostname so ALB listener rules (which match
    # on the ALB hostname, not the CloudFront domain) route correctly.
    location /api/ {
        proxy_pass http://agentic-healthcare-alb-1250466557.us-east-1.elb.amazonaws.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host agentic-healthcare-alb-1250466557.us-east-1.elb.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Serve static assets with long cache (Vite uses content hashing so safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
