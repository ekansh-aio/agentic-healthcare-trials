services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"        # 8001 on host — avoids conflict with local uvicorn on 8000
    env_file: .env         # loads DATABASE_URL, SECRET_KEY, AWS keys, BEDROCK_MODEL, etc.
    volumes:
      - ./backend:/app
      - ./skills:/skills   # trainer.py resolves 4 dirs up from /app/app/services/training → /skills
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - backend_static:/app/static   # persists hosted landing pages across restarts
      - backend_db:/db     # SQLite lives in a named volume so appuser can write to it
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: builder      # Uses Node.js stage — runs Vite dev server with hot reload
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules   # named volume keeps container node_modules isolated
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:8000     # Vite proxies /api/* to backend container
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_outputs:
  backend_static:
  backend_db:
  frontend_node_modules:
